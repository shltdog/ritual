<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ritual</title>

  <style>
    :root {
      --bg: #0b0b0d;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
      --accent: #ff7a18;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
    }

    .header {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="header">Ritual</div>

    <div class="card">
      <p class="muted">Base shell loaded.</p>
    </div>
  </div>

</body>
</html>
