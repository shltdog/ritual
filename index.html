<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ritual</title>

  <!-- iOS / PWA friendliness -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    /* --- RESET / BASE --- */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #0b0b0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }

    /* --- APP LAYOUT --- */
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* --- TEMP PLACEHOLDER UI --- */
    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      opacity: 0.6;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
    }

    /* --- BOTTOM TABS --- */
    nav {
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 8px 0 env(safe-area-inset-bottom);
      background: #0b0b0d;
    }

    nav button {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      opacity: 0.6;
      font-size: 12px;
    }

    nav button.active {
      opacity: 1;
      color: #ff6a2a;
    }
  </style>
</head>

<body>
  <div id="app">
    <main id="view">
      <div class="title">Ritual</div>
      <div class="subtitle">V3 initialized</div>

      <div class="card">
        Everything is wired.  
        Next: real views.
      </div>
    </main>

    <nav>
      <button class="active">Today</button>
      <button>Calendar</button>
      <button>Score</button>
      <button>Settings</button>
    </nav>
  </div>

  <!-- V3 logic -->
  <script type="module" src="./v3/store.js"></script>
</body>
</html>
